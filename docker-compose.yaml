services:
  app:
    container_name: ${APP_NAME}_app
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/data
      - ./prompts:/prompts:ro
      - go_mod_cache:/go/pkg/mod
    environment:
      APP_NAME: ${APP_NAME}
      BOT_NAME: ${BOT_NAME}
      TOKEN_BOT_TOKEN: ${TOKEN_BOT_TOKEN}
      DB_PATH: ${DB_PATH}
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      AI_ENABLED: ${AI_ENABLED}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_MODEL: ${AI_MODEL}
      AI_API_KEY: ${AI_API_KEY}
      AI_SYSTEM_PROMPT_PATH: ${AI_SYSTEM_PROMPT_PATH}
      AI_TIMEOUT_SEC: ${AI_TIMEOUT_SEC}
      AI_HISTORY_LIMIT: ${AI_HISTORY_LIMIT}
    networks:
      - app

networks:
  app:
    name: app
    driver: bridge

volumes:
  go_mod_cache:
