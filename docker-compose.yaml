services:
  app:
    container_name: ${APP_NAME}_app
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
    environment:
      APP_NAME: ${APP_NAME}
      BOT_NAME: ${BOT_NAME}
      TOKEN_BOT_TOKEN: ${TOKEN_BOT_TOKEN}
    networks:
      - app

networks:
  app:
    name: app
    driver: bridge

volumes:
  go_mod_cache:
