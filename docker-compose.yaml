services:
  app:
    container_name: ${APP_NAME}_app
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod
    env_file:
      - .env
    networks:
      - app

networks:
  app:
    name: app
    driver: bridge

volumes:
  go_mod_cache:
